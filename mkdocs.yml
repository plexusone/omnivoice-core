site_name: OmniVoice
site_description: Voice abstraction layer for PlexusOne supporting TTS, STT, and Voice Agents
site_url: https://plexusone.github.io/omnivoice-core
repo_url: https://github.com/plexusone/omnivoice-core
repo_name: plexusone/omnivoice-core

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Design:
      - Voice Integration PRD: voice-integration-prd.md
      - Twilio Integration TRD: twilio-integration-trd.md
      - Provider Conformance Testing: provider-conformance-testing.md
  - Guides:
      - Transcript Format: transcript.md
      - Testing with Mocks: testing.md
      - Observability: observability.md
      - Provider Registry: registry.md
      - Voice Cloning: voice-cloning.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
  - Releases:
      - v0.9.0: releases/v0.9.0.md
      - v0.8.0: releases/v0.8.0.md
      - v0.7.0: releases/v0.7.0.md
      - v0.6.0: releases/v0.6.0.md
      - v0.5.0: releases/v0.5.0.md
      - v0.4.1: releases/v0.4.1.md
      - v0.4.0: releases/v0.4.0.md
      - v0.3.0: releases/v0.3.0.md
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/omnivoice-core
